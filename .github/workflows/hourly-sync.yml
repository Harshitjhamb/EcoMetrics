name: EcoMetrics Hourly Sync

on:
  schedule:
    # Every hour at :15 UTC
    - cron: "15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Opt into Node.js 24 for JS-based actions (future-proof)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run one sync
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
          INDIA_DATA_API_KEY: ${{ secrets.INDIA_DATA_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          FLASK_DEBUG: "false"
        run: |
          python backend/sync_once.py
